<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite de Casamento - Alysson e Alexandra</title>
    
    <!-- Importação das fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&family=Tangerine:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome para o ícone de presente -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary-orange: #e67e22;
            --soft-cream: #fffaf5;
            --text-dark: #5d4037;
            --font-fancy: "Tangerine", cursive;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f1e9;
            overflow: hidden;
        }

        /* --- Envelope Semi-Transparente --- */
        #envelope-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: flex;
            perspective: 1000px;
        }

        .curtain {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            /* Transparência e efeito de desfoque (Glassmorphism) */
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            
            transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .left-side { 
            left: 0; 
            border-right: 1px solid rgba(255, 255, 255, 0.3); 
        }
        .right-side { 
            right: 0; 
        }

        .seal-ribbon {
            position: absolute;
            top: 48%;
            left: 0;
            width: 100%;
            height: 25px;
            background: rgba(230, 126, 34, 0.3);
            transform: translateY(-50%);
            z-index: 102;
        }

        .seal-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 105;
            cursor: pointer;
            text-align: center;
            transition: all 0.8s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .seal-wax {
            width: 120px;
            height: 120px;
            background: var(--primary-orange);
            background-image: radial-gradient(circle at 40% 40%, #ff9d4d 0%, var(--primary-orange) 75%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: var(--font-fancy);
            font-size: 2.2rem;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .seal-label {
            margin-top: 20px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--text-dark);
            text-shadow: 0 0 10px rgba(255,255,255,0.8); /* Melhora leitura sobre transparência */
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); opacity: 0.8; }
            50% { transform: translateY(-10px); opacity: 1; }
        }

        .opened .left-side { transform: translateX(-100%); }
        .opened .right-side { transform: translateX(100%); }
        .opened .seal-ribbon { opacity: 0; }
        .opened .seal-container { opacity: 0; pointer-events: none; }

        /* --- Conteúdo Interno --- */
        #invitation-content {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--soft-cream);
            text-align: center;
            color: var(--text-dark);
            position: relative;
        }

        .decor-img {
            width: 100%;
            max-width: 450px;
            height: auto;
            display: block;
        }

        .top-img { margin-bottom: -15px; }
        .bottom-img { margin-top: auto; max-width: 400px; }

        h1 { 
            font-family: var(--font-fancy); 
            font-size: 4.8rem; 
            color: var(--primary-orange); 
            margin: 0;
            padding-top: 10px;
            font-weight: 400;
        }

        p.invite-text { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-size: 1.3rem; 
            margin: 5px 0 15px 0;
            width: 90%;
            max-width: 500px;
        }

        .date-section {
            margin: 10px 0;
            width: 90%;
            max-width: 500px;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: rgba(230, 126, 34, 0.4);
        }
        .divider::before, .divider::after {
            content: "";
            height: 1px;
            width: 60px;
            background: linear-gradient(to var(--direction, right), transparent, var(--primary-orange), transparent);
        }
        .divider::before { --direction: right; }
        .divider::after { --direction: left; }
        .diamond { transform: rotate(45deg); width: 6px; height: 6px; border: 1px solid var(--primary-orange); }

        .date-time { 
            font-family: 'Playfair Display', serif; 
            color: var(--primary-orange);
            font-size: 1.5rem;
            line-height: 1.1;
            margin: 10px 0;
            font-weight: 800;
        }

        .address { 
            font-size: 0.95rem;
            line-height: 1.4;
            margin-top: 10px;
            color: var(--text-dark);
        }

        .cta-helper {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.9rem;
            color: var(--text-dark);
            margin-top: 20px;
            opacity: 0.8;
        }

        .cta-section { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 10px; 
            padding-bottom: 20px;
        }

        .btn-item { 
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 90px;
            -webkit-tap-highlight-color: transparent;
        }

        .icon-circle { 
            width: 65px; 
            height: 65px; 
            border: 2px solid white; 
            background: var(--primary-orange);
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-bottom: 8px; 
            box-shadow: 0 6px 12px rgba(230, 126, 34, 0.3);
        }

        .icon-small {
            width: 24px !important; 
            height: 24px !important;
            fill: white;
        }

        .icon-circle i { 
            font-size: 26px; 
        }

        .btn-label { 
            font-size: 0.7rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: var(--text-dark);
        }

        @media (max-width: 600px) {
            h1 { font-size: 4rem; }
            .decor-img { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- Envelope que permite ver o fundo -->
    <div id="envelope-wrapper">
        <div class="curtain left-side"></div>
        <div class="curtain right-side"></div>
        <div class="seal-ribbon"></div>

        <div class="seal-container" onclick="openInvitation()">
            <div class="seal-wax">
                <span>A & A</span>
            </div>
            <div class="seal-label">Toque para abrir</div>
        </div>
    </div>

    <main id="invitation-content">
        <img src="top.png" alt="Decoração Topo" class="decor-img top-img">

        <h1>Alysson e Alexandra</h1>
        <p class="invite-text">Convidam para a celebração de seu casamento.</p>

        <div class="date-section">
            <div class="divider"><div class="diamond"></div></div>
            <div class="date-time">
                Sábado, 22 de Agosto de 2026 <br>
                às 16h30
            </div>
            <div class="divider"><div class="diamond"></div></div>
            <div class="address">
                <strong>Avenida José Antônio de Moraes Neto, 4501</strong><br>
                Mairiporã - São Paulo
            </div>
        </div>

        <p class="cta-helper">Toque para acessar</p>

        <section class="cta-section">
            <a href="https://noivos.casar.com/aly-e-xan#/rsvp" target="_blank" class="btn-item">
                <div class="icon-circle">
                    <svg class="icon-small" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </div>
                <span class="btn-label">Confirme</span>
            </a>
            
            <a href="https://www.google.com/maps/search/Avenida+Jos%C3%A9+Ant%C3%B4nio+de+Moraes+Neto,+4501+Mairipor%C3%A3" target="_blank" class="btn-item">
                <div class="icon-circle">
                    <svg class="icon-small" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                </div>
                <span class="btn-label">Localização</span>
            </a>
            
            <a href="https://noivos.casar.com/aly-e-xan#/presentes" target="_blank" class="btn-item">
                <div class="icon-circle">
                    <i class="fa-solid fa-gift" style="color: rgb(255, 255, 255);"></i>
                </div>
                <span class="btn-label">Presentes</span>
            </a>
        </section>

        <img src="bt.png" alt="Decoração Rodapé" class="decor-img bottom-img">
    </main>

    <script>
        function openInvitation() {
            document.body.classList.add('opened');
            setTimeout(() => {
                // Remove o wrapper para liberar cliques no conteúdo de baixo
                document.getElementById('envelope-wrapper').style.pointerEvents = 'none';
            }, 1500);
        }
    </script>
</body>
</html>
