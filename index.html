<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite de Casamento - Alysson e Alexandra</title>
    <!-- Importação das fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&family=Tangerine:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-orange: #e67e22;
            --soft-cream: #fffaf5;
            --text-dark: #5d4037;
            --font-fancy: "Tangerine", cursive;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f1e9;
            overflow: hidden;
        }

        /* --- Estrutura da Cortina --- */
        #envelope-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: flex;
            perspective: 1000px;
        }

        .curtain {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: #fff;
            background-image: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
                              url('https://www.transparenttextures.com/patterns/cream-paper.png');
            transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .left-side { left: 0; border-right: 1px solid rgba(230, 126, 34, 0.1); }
        .right-side { right: 0; }

        .seal-ribbon {
            position: absolute;
            top: 48%;
            left: 0;
            width: 100%;
            height: 25px;
            background: rgba(230, 126, 34, 0.25);
            transform: translateY(-50%);
            z-index: 102;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .seal-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 105;
            cursor: pointer;
            text-align: center;
            transition: all 0.8s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .seal-wax {
            width: 130px;
            height: 130px;
            background: var(--primary-orange);
            background-image: radial-gradient(circle at 40% 40%, #ff9d4d 0%, var(--primary-orange) 75%);
            border-radius: 50% 45% 52% 48% / 48% 52% 50% 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: var(--font-fancy);
            font-size: 2.2rem;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2), inset 0 0 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .seal-label {
            margin-top: 25px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--text-dark);
            font-size: 1.2rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); opacity: 0.7; }
            50% { transform: translateY(-10px); opacity: 1; }
        }

        .opened .left-side { transform: translateX(-100%); }
        .opened .right-side { transform: translateX(100%); }
        .opened .seal-ribbon { opacity: 0; transition: 0.5s; }
        .opened .seal-container { opacity: 0; transform: translate(-50%, -50%) scale(0.5); pointer-events: none; }

        /* --- Conteúdo Interno --- */
        #invitation-content {
            min-height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0; /* Removi o padding para as imagens encostarem nas bordas */
            background-color: var(--soft-cream);
            text-align: center;
            color: var(--text-dark);
            position: relative;
        }

        /* Estilo das imagens de topo e rodapé */
        .decor-img {
            width: 100%;
            max-width: 600px; /* Evita que a foto fique gigante em telas grandes */
            height: auto;
            display: block;
        }

        .top-img { margin-bottom: 20px; }
        .bottom-img { margin-top: auto; }

        h1 { 
            font-family: var(--font-fancy); 
            font-size: 5.5rem; 
            color: var(--primary-orange); 
            margin: 10px 0;
            font-weight: 400;
        }

        p.invite-text { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-size: 1.6rem; 
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .date-section {
            position: relative;
            margin: 30px 0;
            padding: 20px 0;
            width: 100%;
            max-width: 500px;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: rgba(230, 126, 34, 0.4);
        }
        .divider::before, .divider::after {
            content: "";
            height: 1px;
            width: 80px;
            background: linear-gradient(to var(--direction, right), transparent, var(--primary-orange), transparent);
        }
        .divider::before { --direction: right; }
        .divider::after { --direction: left; }
        .diamond { transform: rotate(45deg); width: 8px; height: 8px; border: 1px solid var(--primary-orange); }

        .date-time { 
            font-family: 'Playfair Display', serif; 
            color: var(--primary-orange);
            font-size: 2rem;
            line-height: 1.2;
            margin: 15px 0;
            font-weight: 800;
        }

        .address { 
            font-size: 1.1rem;
            line-height: 1.6;
            margin-top: 20px;
            color: var(--text-dark);
            padding: 0 20px;
        }

        /* --- Botões Grandes --- */
        .cta-section { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 40px; 
            padding-bottom: 40px; /* Ajustado para dar espaço à imagem de baixo */
        }

        .btn-item { 
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 110px;
            -webkit-tap-highlight-color: transparent;
        }

        .icon-circle { 
            width: 85px; 
            height: 85px; 
            border: 2px solid white; 
            background: var(--primary-orange);
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-bottom: 12px; 
            box-shadow: 0 10px 20px rgba(230, 126, 34, 0.4), 
                        0 4px 6px rgba(0, 0, 0, 0.1); 
            transition: transform 0.2s ease;
        }

        .btn-item:active .icon-circle {
            transform: scale(0.92);
        }

        .icon-circle svg { 
            width: 38px; 
            height: 38px; 
            fill: white; 
        }

        .btn-label { 
            font-size: 0.85rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            color: var(--text-dark);
        }

        @media (max-width: 600px) {
            h1 { font-size: 3.8rem; }
            .date-time { font-size: 1.8rem; }
            .cta-section { gap: 15px; }
            .btn-item { width: 100px; }
            .icon-circle { width: 80px; height: 80px; border-width: 3px; }
        }
    </style>
</head>
<body>

    <div id="envelope-wrapper">
        <div class="curtain left-side"></div>
        <div class="curtain right-side"></div>
        <div class="seal-ribbon"></div>

        <div class="seal-container" onclick="openInvitation()">
            <div class="seal-wax">
                <span>A & A</span>
            </div>
            <div class="seal-label">Toque para abrir</div>
        </div>
    </div>

    <main id="invitation-content">
        <!-- IMAGEM DO TOPO -->
        <img src="top.png" alt="Decoração Topo" class="decor-img top-img">

        <h1>Alysson e Alexandra</h1>
        <p class="invite-text">Convidam para a celebração de seu casamento.</p>

        <div class="date-section">
            <div class="divider"><div class="diamond"></div></div>
            <div class="date-time">
                Sábado, 22 de Agosto de 2026 <br>
                às 16h30
            </div>
            <div class="divider"><div class="diamond"></div></div>
            <div class="address">
                <strong>Avenida José Antônio de Moraes Neto, 4501</strong><br>
                Mairiporã - São Paulo
            </div>
        </div>

        <section class="cta-section">
            <a href="https://noivos.casar.com/aly-e-xan#/rsvp" target="_blank" class="btn-item">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </div>
                <span class="btn-label">Confirme</span>
            </a>
            
            <a href="https://www.google.com/maps/search/Avenida+Jos%C3%A9+Ant%C3%B4nio+de+Moraes+Neto,+4501+Mairipor%C3%A3" target="_blank" class="btn-item">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                </div>
                <span class="btn-label">Localização</span>
            </a>
            
            <a href="https://noivos.casar.com/aly-e-xan#/presentes" target="_blank" class="btn-item">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3s-3 1.34-3 3c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zM9 4c0-.55.45-1 1-1s1 .45 1 1v2H9V4zm6 0c0-.55.45-1 1-1s1 .45 1 1v2h-2V4z"/></svg>
                </div>
                <span class="btn-label">Presentes</span>
            </a>
        </section>

        <!-- IMAGEM DO RODAPÉ -->
        <img src="bt.png" alt="Decoração Rodapé" class="decor-img bottom-img">
    </main>

    <script>
        function openInvitation() {
            document.body.classList.add('opened');
            setTimeout(() => {
                document.body.style.overflow = 'auto';
                document.getElementById('envelope-wrapper').style.display = 'none';
            }, 1500);
        }
    </script>
</body>
</html>
