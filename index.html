
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite de Casamento - Alysson e Alexandra</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --primary-orange: #e67e22;
            --soft-cream: #fffaf5;
            --text-dark: #5d4037;
            --accent-green: #4a7c44;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f1e9;
            overflow: hidden;
        }

        /* --- Envelope / Capa --- */
        #envelope {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1), opacity 1s;
            background-image: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)),
                              url('https://www.transparenttextures.com/patterns/cream-paper.png');
        }

        .envelope-floral {
            position: absolute;
            width: 100%;
            height: 150px;
            background-size: contain;
            background-repeat: repeat-x;
            opacity: 0.6;
        }
        .top-floral { top: 0; background-image: url('https://cdn.pixabay.com/photo/2017/05/07/11/44/watercolor-2292350_1280.png'); transform: rotate(180deg); }
        .bottom-floral { bottom: 0; background-image: url('https://cdn.pixabay.com/photo/2017/05/07/11/44/watercolor-2292350_1280.png'); }

        .envelope-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            background: #d35400;
            transform: translateX(-50%);
        }

        .seal-container {
            position: relative;
            z-index: 101;
            cursor: pointer;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .seal-container:hover {
            transform: scale(1.1);
        }

        .seal-heart {
            width: 120px;
            height: 110px;
            background-color: var(--primary-orange);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            clip-path: path('M60,30 C60,30 50,0 30,0 C10,0 0,20 0,40 C0,70 60,110 60,110 C60,110 120,70 120,40 C120,20 110,0 90,0 C70,0 60,30 60,30 Z');
            border: 2px solid rgba(255,255,255,0.3);
        }

        .seal-label {
            margin-top: 20px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--text-dark);
            font-size: 1.4rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* --- Conteúdo do Convite --- */
        #invitation-content {
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
            background-color: var(--soft-cream);
            text-align: center;
            color: var(--text-dark);
            position: relative;
        }

        .floral-header, .floral-footer {
            width: 100%;
            max-width: 600px;
            margin: 20px 0;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: var(--primary-orange);
            margin: 20px 0;
        }

        .invite-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .date-time {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.6rem;
            color: var(--primary-orange);
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
            width: 80%;
            max-width: 400px;
            margin: 20px auto;
        }

        .address {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 20px 0;
        }

        .cta-section {
            margin-top: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding-bottom: 50px;
        }

        .btn-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-dark);
            width: 120px;
            transition: transform 0.3s;
        }

        .btn-item:hover {
            transform: translateY(-5px);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background-color: var(--primary-orange);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .icon-circle svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .btn-label {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* --- Estado Aberto --- */
        .opened #envelope {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; }
            .date-time { font-size: 1.2rem; }
            .btn-item { width: 100px; }
            .icon-circle { width: 70px; height: 70px; }
        }
    </style>
</head>
<body>

    <div id="envelope">
        <div class="envelope-floral top-floral"></div>
        <div class="envelope-line"></div>
        
        <div class="seal-container" onclick="openInvitation()">
            <div class="seal-heart">
                <span>A + A</span>
            </div>
            <div class="seal-label">Toque no selo para abrir</div>
        </div>

        <div class="envelope-floral bottom-floral"></div>
    </div>

    <main id="invitation-content">
        <div class="floral-header">
            <svg viewBox="0 0 500 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 50 Q125 0 250 50 T500 50" stroke="#e67e22" stroke-width="1" opacity="0.5"/>
            </svg>
        </div>

        <h1>Alysson e Alexandra</h1>
        
        <p class="invite-text">Convidam para a celebração de seu casamento.</p>

        <div class="date-time">
            Sábado, 22 de Agosto às 16h30.
        </div>

        <div class="address">
            Avenida José Antônio de Moraes Neto, 4501.<br>
            Mairiporã - São Paulo - 07600-000
        </div>

        <p style="margin-top: 40px; font-weight: 300;">Toque para acessar:</p>

        <section class="cta-section">
            <a href="https://noivos.casar.com/aly-e-xan#/rsvp" target="_blank" class="btn-item">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </div>
                <span class="btn-label">Confirmar Presença</span>
            </a>

            <a href="https://www.google.com/maps/place/Av.+Jos%C3%A9+Ant%C3%B4nio+de+Moraes+Neto,+4501+-+Mairipor%C3%A3,+SP,+07608-210/@-23.358904,-46.641665,17z/data=!3m1!4b1!4m6!3m5!1s0x94ceefd81f922ba1:0x28d2a14bbbf31882!8m2!3d-23.358904!4d-46.641665!16s%2Fg%2F11m63qzqxn?entry=ttu&g_ep=EgoyMDI2MDQyOS4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="btn-item">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                </div>
                <span class="btn-label">Localização</span>
            </a>

            <a href="https://noivos.casar.com/aly-e-xan#/presentes" target="_blank" class="btn-item">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.65-.5-.65C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.41 12.25 12 8.66l3.59 3.59L17 10.83 14.92 8H20v6z"/></svg>
                </div>
                <span class="btn-label">Lista de Presentes</span>
            </a>
        </section>

        <div class="floral-footer">
            <svg viewBox="0 0 500 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 50 Q125 100 250 50 T500 50" stroke="#e67e22" stroke-width="1" opacity="0.5"/>
            </svg>
        </div>
    </main>

    <script>
        function openInvitation() {
            document.body.classList.add('opened');
            // Permite o scroll após abrir
            setTimeout(() => {
                document.body.style.overflow = 'auto';
            }, 1000);
        }
    </script>
</body>
</html>
